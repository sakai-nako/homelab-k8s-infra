# Sealed Secrets controller, managed by ArgoCD.
#
# Purpose: enables committing encrypted Secret manifests (SealedSecret) to Git.
# The controller decrypts them in-cluster using its master key.
#
# CRITICAL: the master key (Secret in `sealed-secrets` ns, labeled
# `sealedsecrets.bitnami.com/sealed-secrets-key: active`) is the single source
# of truth for decryption. If lost, all SealedSecret manifests in Git become
# permanently unusable. See docs/backup.md for the GPG-encrypted backup flow.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://bitnami-labs.github.io/sealed-secrets
      chart: sealed-secrets
      targetRevision: 2.18.6
      helm:
        valueFiles:
          - $values/charts/sealed-secrets/values.yaml
    - repoURL: http://forgejo-http.forgejo.svc.cluster.local:3000/sakai/local-infra.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: sealed-secrets
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
