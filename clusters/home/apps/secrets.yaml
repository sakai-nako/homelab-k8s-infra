# SealedSecret manifests Application.
#
# Source: secrets/ directory at the repo root contains SealedSecret YAML files.
# Each file declares its own metadata.namespace, so this single Application
# can apply secrets into multiple namespaces (forgejo, argocd, ...).
#
# The sealed-secrets controller (sealed-secrets ns) decrypts each SealedSecret
# into a regular Secret. SealedSecret manifests are safe to commit to Git;
# only the controller's master key (backed up to NAS) can decrypt them.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: secrets
  namespace: argocd
spec:
  project: default
  source:
    repoURL: http://forgejo-http.forgejo.svc.cluster.local:3000/sakai/local-infra.git
    targetRevision: main
    path: secrets
  destination:
    server: https://kubernetes.default.svc
    # SealedSecret 自身の namespace は YAML 内 metadata で指定する。
    # Application の destination は cluster-scoped 扱いの便宜上の指定。
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
