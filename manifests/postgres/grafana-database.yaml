# Grafana 用データベース (CloudNativePG Database CR、宣言的)。
#
# pg-main 上に grafana DB を作成し owner を grafana role に。role 自体は
# cluster.yaml の spec.managed.roles[grafana] で管理 (password は grafana-pg SealedSecret)。
# Grafana は kube-prometheus-stack の grafana subchart から PostgreSQL backend として接続する
# (charts/monitoring/values.yaml の grafana.ini.database 参照)。
#
# databaseReclaimPolicy: retain — Database CR を消しても実 DB は残す (データ保護)。

apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: grafana
  namespace: postgres
spec:
  name: grafana
  owner: grafana
  cluster:
    name: pg-main
  ensure: present
  databaseReclaimPolicy: retain
