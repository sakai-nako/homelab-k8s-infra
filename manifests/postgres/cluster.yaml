# Shared PostgreSQL Cluster managed by CloudNativePG.
#
# This is the single shared DB cluster for local-infra:
#   - forgejo DB (Phase 2: migration target from current SQLite)
#   - grafana DB (Phase 2: kube-prometheus-stack と同時に追加。managed.roles + Database CR)
#   - sonarqube DB (Phase 3: SonarQube CE と同時に追加。managed.roles + Database CR)
#   - quality DB (Phase 4: quality-agent の score 時系列保存。managed.roles + Database CR)
#
# Additional databases will be added as cnpg.io/v1 Database CRs in this
# directory so the operator can manage them declaratively.
#
# Connection secret auto-generated by CNPG: `pg-main-app`
#   keys: username, password, dbname, host, port, uri, jdbc-uri, pgpass
# Applications consume this secret directly or via SealedSecret-managed copies.

apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: pg-main
  namespace: postgres
spec:
  instances: 1

  imageName: ghcr.io/cloudnative-pg/postgresql:17.2

  # superuser (postgres) アクセスは postgres-dump CronJob (層 1 論理ダンプ、
  # manifests/backups/) の pg_dumpall が必要とするため有効化している (Phase 6)。
  # 有効化すると CNPG が `pg-main-superuser` Secret (username/password) を
  # 自動生成・管理する。アプリは引き続き各 app user で接続する。
  enableSuperuserAccess: true

  bootstrap:
    initdb:
      database: forgejo
      owner: forgejo
      encoding: UTF8
      localeCType: C
      localeCollate: C

  storage:
    storageClass: local-path
    size: 10Gi

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

  # 軽量化: WAL アーカイブやバックアップは Velero/SeaweedFS 投入後に追加
  # backup: なし (Phase 2 後半で追加)

  # Postgres parameter override (個人運用なら控えめ)
  postgresql:
    parameters:
      max_connections: "100"
      shared_buffers: "128MB"
      work_mem: "4MB"
      effective_cache_size: "256MB"

  # 追加 role を宣言的に管理する (forgejo は initdb 由来なのでここには無い)。
  # grafana role の password は postgres ns の grafana-pg SealedSecret (basic-auth type)
  # を参照。同じ password を monitoring ns の grafana-pg にも封入し Grafana へ env 注入する。
  managed:
    roles:
      - name: grafana
        ensure: present
        login: true
        # inherit / connectionLimit は CNPG operator が defaulting で付与する値。
        # Git に明示して live と一致させ ArgoCD の OutOfSync (drift) を防ぐ。
        inherit: true
        connectionLimit: -1
        passwordSecret:
          name: grafana-pg
      # sonarqube role の password は postgres ns の sonarqube-pg SealedSecret (basic-auth type)
      # を参照。同じ password を sonarqube ns の sonarqube-app にも封入し JDBC 接続に使う。
      - name: sonarqube
        ensure: present
        login: true
        inherit: true
        connectionLimit: -1
        passwordSecret:
          name: sonarqube-pg
      # quality role の password は postgres ns の quality-pg SealedSecret (basic-auth type)
      # を参照。quality-agent (Phase 4) が score 時系列を quality DB に書き込む。
      # 同じ password は live Secret から復号して Forgejo Actions job に渡す (step ② で配線)。
      - name: quality
        ensure: present
        login: true
        inherit: true
        connectionLimit: -1
        passwordSecret:
          name: quality-pg
      # quality_ro は quality DB の読み取り専用ロール (Phase 5)。Grafana の
      # PostgreSQL datasource がスコア時系列の SELECT に使う。password は
      # postgres ns の quality-ro-pg SealedSecret を参照し、同じ password を
      # monitoring ns の quality-ro-pg にも封入して Grafana へ env 注入する。
      # SELECT 権限は quality-agent の schema.sql (DO ブロック) が冪等に GRANT する。
      - name: quality_ro
        ensure: present
        login: true
        inherit: true
        connectionLimit: -1
        passwordSecret:
          name: quality-ro-pg

  # monitoring (Prometheus PodMonitor) は kube-prometheus-stack 投入後に有効化
  monitoring:
    enablePodMonitor: false
