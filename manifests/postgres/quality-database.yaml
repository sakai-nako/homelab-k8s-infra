# quality-agent 用データベース (CloudNativePG Database CR、宣言的)。
#
# pg-main 上に quality DB を作成し owner を quality role に。role 自体は
# cluster.yaml の spec.managed.roles[quality] で管理 (password は quality-pg SealedSecret)。
# quality-agent (Phase 4) が collect→analyze→score した結果を時系列で書き込む
# (テーブルは quality_agent/report/schema.sql、エージェントが CREATE IF NOT EXISTS で適用)。
#
# databaseReclaimPolicy: retain — Database CR を消しても実 DB は残す (スコア履歴保護)。

apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: quality
  namespace: postgres
spec:
  name: quality
  owner: quality
  cluster:
    name: pg-main
  ensure: present
  databaseReclaimPolicy: retain
