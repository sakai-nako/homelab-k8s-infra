# sealed-secrets master key の週次 GPG バックアップ CronJob (層 1、最重要)。
#
# controller はデフォルトで 30 日ごとに sealing key をローテーションするため、
# 手動バックアップ 1 回では新しい鍵が漏れる。label
# `sealedsecrets.bitnami.com/sealed-secrets-key=active` の全 Secret (歴代の鍵を含む)
# を毎週まとめて GPG 対称暗号化し NAS へ退避する。
#
# - パスフレーズは backup-gpg-passphrase Secret (SealedSecret 管理)。**同じ値を
#   パスワードマネージャにも必ず保管する** (DR 時はクラスタ外で復号するため)。
#   クラスタ内にパスフレーズがあっても問題ない: クラスタを掌握できる攻撃者は
#   master key 自体を直接読めるので、守るべきは NAS 上のバックアップだけ。
# - 暗号化後にラウンドトリップ復号で検証してから NAS へ置く。
# - 平文 (鍵 YAML) は tmpfs (emptyDir medium: Memory) 上にのみ存在させる。
# - 世代は全保持 (1 ファイル数 KB)。復元手順は docs/runbooks/sealed-secrets.md。
# - kubectl + gpg を両方持つ公開イメージが無いため alpine/k8s に apk で gnupg を
#   足す (velero-export の dnf install と同じ妥協。エアギャップ要件が出たら
#   カスタムイメージへ)。apk が root を要するため root で動かす (NAS は cifs で
#   root 書き込み可)。

apiVersion: v1
kind: ServiceAccount
metadata:
  name: sealed-secrets-key-backup
  namespace: sealed-secrets
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: sealed-secrets-key-backup
  namespace: sealed-secrets
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sealed-secrets-key-backup
  namespace: sealed-secrets
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: sealed-secrets-key-backup
subjects:
  - kind: ServiceAccount
    name: sealed-secrets-key-backup
    namespace: sealed-secrets
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: sealed-secrets-key-backup
  namespace: sealed-secrets
spec:
  # 毎週日曜 03:45 JST (層 1 ダンプ群の後)
  schedule: "45 3 * * 0"
  timeZone: Asia/Tokyo
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      # Job の整理は history limit に任せる (postgres-dump と同じ判断で ttl 無し)
      backoffLimit: 2
      template:
        spec:
          serviceAccountName: sealed-secrets-key-backup
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: alpine/k8s:1.31.4
              env:
                - name: NAS_DIR
                  value: /mnt/nas/local-infra-backups/keys
                - name: GNUPGHOME
                  value: /work/.gnupg
              command:
                - /bin/sh
                - -c
                - |
                  set -eu
                  apk add --no-cache --quiet gnupg

                  # --- NAS 書き込み可否 pre-check (SMB 断を早期検知) ---
                  mkdir -p "$NAS_DIR"
                  if ! touch "$NAS_DIR/.write-test" 2>/dev/null; then
                    echo "FATAL: $NAS_DIR is not writable (NAS マウント断?)" >&2
                    exit 1
                  fi
                  rm -f "$NAS_DIR/.write-test"

                  mkdir -p -m 700 "$GNUPGHOME"
                  TS=$(date -u +%Y%m%dT%H%M%S)

                  echo "exporting active sealing keys ..."
                  kubectl get secret -n sealed-secrets \
                    -l sealedsecrets.bitnami.com/sealed-secrets-key=active \
                    -o yaml > /work/keys.yaml
                  if ! grep -q 'kind: Secret' /work/keys.yaml; then
                    echo "FATAL: active sealing key が 1 つも見つからない" >&2
                    exit 1
                  fi
                  KEYS=$(grep -c 'tls.key' /work/keys.yaml || true)
                  echo "found ${KEYS} key(s)"

                  echo "encrypting (AES256, passphrase from backup-gpg-passphrase) ..."
                  gpg --batch --symmetric --cipher-algo AES256 \
                      --pinentry-mode loopback \
                      --passphrase-file /secrets/passphrase \
                      --output /work/keys.gpg /work/keys.yaml

                  # --- ラウンドトリップ検証: 復号結果が元と一致すること ---
                  gpg --batch --decrypt --pinentry-mode loopback \
                      --passphrase-file /secrets/passphrase \
                      /work/keys.gpg | cmp - /work/keys.yaml
                  echo "round-trip decryption OK"

                  cp /work/keys.gpg "$NAS_DIR/sealed-secrets-master-${TS}.gpg"
                  rm -f /work/keys.yaml /work/keys.gpg

                  echo "done:"
                  ls -lh "$NAS_DIR" | tail -5
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: false
                capabilities:
                  drop:
                    - ALL
                  # NAS は cifs (uid=1000, dir_mode 0755) なので root でも
                  # DAC_OVERRIDE が無いと書けない (drop ALL だけだと EACCES。
                  # E2E で実測)。書き込みに必要な最小 capability だけ戻す。
                  add:
                    - DAC_OVERRIDE
              volumeMounts:
                # 平文の鍵 YAML を置くのは tmpfs のみ (ノードのディスクに残さない)
                - name: work
                  mountPath: /work
                - name: passphrase
                  mountPath: /secrets
                  readOnly: true
                - name: nas
                  mountPath: /mnt/nas
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 256Mi
          volumes:
            - name: work
              emptyDir:
                medium: Memory
            - name: passphrase
              secret:
                secretName: backup-gpg-passphrase
            - name: nas
              hostPath:
                path: /mnt/nas
                type: Directory
