# SonarQube 解析設定 (sonar-scan-nightly CronJob が clone したこのリポジトリを解析する)。
# host.url / token は manifests/quality-agent/sonar-scan-cronjob.yaml の env で渡す。
# プロジェクトキーは quality-agent collect の --target / --sonarqube-component と一致させる。
sonar.projectKey=local-infra
sonar.projectName=local-infra
sonar.sourceEncoding=UTF-8

sonar.sources=.
# テストは sources と重複指定できないため exclusions で外して tests に割り当てる
sonar.tests=quality-agent/tests
sonar.exclusions=**/__pycache__/**,**/*.pyc,secrets/**,quality-agent/tests/**

sonar.python.version=3.12
